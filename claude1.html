<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>مسابقة إبداع</title>
    <style>
        /* Added Outfit font for numbers to make them look more premium */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Deepened the dark background for better contrast */
            --bg-dark:    #07080d;
            /* Translucent card backgrounds for glassmorphism */
            --bg-card:    rgba(21, 24, 40, 0.65);
            --bg-card2:   rgba(28, 32, 53, 0.8);
            --neon-blue:  #00d4ff;
            --neon-green: #39ff9a;
            --neon-pink:  #ff2d78;
            --gold:       #ffd700;
            --silver:     #e2e8f0;
            --bronze:     #f59e0b;
            --text-main:  #ffffff;
            --text-dim:   #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-main);
        }

        /* ── grid bg ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            /* Added a mask to fade out the grid at the edges */
            mask-image: radial-gradient(circle at center top, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center top, black 30%, transparent 100%);
        }

        /* ── glow blobs (Added subtle animations) ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: blob-float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width:450px;height:450px;background:rgba(0,212,255,.15);top:-100px;right:-100px; }
        .blob-2 { width:400px;height:400px;background:rgba(57,255,154,.12);bottom:-100px;left:-100px; animation-delay: -5s; }
        .blob-3 { width:300px;height:300px;background:rgba(255,45,120,.10);top:40%;left:50%;transform:translate(-50%,-50%); animation-delay: -10s; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -60px) scale(1.1); }
        }

        /* ── header ── */
        .page-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem 1rem 1.5rem;
        }
        .page-header .crown { font-size: 3.5rem; display: block; margin-bottom: .5rem; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); }
        .page-header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, #c0c8d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }
        .page-header .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--neon-blue);
            margin-top: .5rem;
            letter-spacing: 4px;
            font-weight: 700;
        }

        /* ── divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 550px;
            margin: 0 auto 2rem;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent); }
        .divider-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-blue); box-shadow: 0 0 12px var(--neon-blue), 0 0 24px var(--neon-blue); }

        /* ── cards ── */
        .cards-list {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-width: 580px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .card {
            background: var(--bg-card);
            /* Added glassmorphism blur */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,.1);
            overflow: hidden;
            transition: all .3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(0,212,255,.4);
            box-shadow: 0 15px 40px rgba(0,212,255,.15);
            background: rgba(28, 32, 53, 0.8);
        }

        /* rank glow for top 3 */
        .card.rank-1 { border-color: rgba(255,215,0,.4);  box-shadow: 0 5px 30px rgba(255,215,0,.1); }
        .card.rank-2 { border-color: rgba(226,232,240,.3); box-shadow: 0 5px 25px rgba(226,232,240,.05); }
        .card.rank-3 { border-color: rgba(245,158,11,.3);  box-shadow: 0 5px 25px rgba(245,158,11,.05); }
        
        .card.rank-1:hover { border-color: rgba(255,215,0,.8); box-shadow: 0 15px 50px rgba(255,215,0,.2); }
        .card.rank-2:hover { border-color: rgba(226,232,240,.6); box-shadow: 0 15px 40px rgba(226,232,240,.15); }
        .card.rank-3:hover { border-color: rgba(245,158,11,.6); box-shadow: 0 15px 40px rgba(245,158,11,.15); }

        /* ── side stripe instead of top stripe for a modern look ── */
        .card-stripe {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 5px;
            background: linear-gradient(180deg, var(--neon-blue), var(--neon-green));
            transition: width 0.3s;
        }
        .card:hover .card-stripe { width: 8px; }
        .card.rank-1 .card-stripe { background: linear-gradient(180deg, #ffd700, #fffbe6, #ffd700); }
        .card.rank-2 .card-stripe { background: linear-gradient(180deg, #e2e8f0, #fff, #e2e8f0); }
        .card.rank-3 .card-stripe { background: linear-gradient(180deg, #f59e0b, #ffd4b0, #f59e0b); }

        /* ── card body ── */
        .card-body {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.2rem 1.5rem 1.2rem 1.2rem;
        }

        /* rank badge */
        .rank-badge {
            min-width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            flex-shrink: 0;
            background: rgba(255,255,255,0.03);
            color: var(--text-dim);
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }
        .rank-badge.gold   { background:rgba(255,215,0,.15);   color:var(--gold);    border-color:rgba(255,215,0,.5);   box-shadow:0 0 15px rgba(255,215,0,.3); }
        .rank-badge.silver { background:rgba(226,232,240,.1);  color:var(--silver);  border-color:rgba(226,232,240,.4); box-shadow:0 0 15px rgba(226,232,240,.15); }
        .rank-badge.bronze { background:rgba(245,158,11,.15);  color:var(--bronze);  border-color:rgba(245,158,11,.4);  box-shadow:0 0 15px rgba(245,158,11,.15); }

        /* avatar - Changed to fully round */
        .avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(0,212,255,.3);
            background: var(--bg-card2);
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .card:hover .avatar { transform: scale(1.08); }
        .card.rank-1 .avatar { border-color: rgba(255,215,0,.8); box-shadow: 0 0 20px rgba(255,215,0,.4); }
        .card.rank-2 .avatar { border-color: rgba(226,232,240,.6); }
        .card.rank-3 .avatar { border-color: rgba(245,158,11,.6); }
        .avatar img { width:100%; height:100%; object-fit:cover; }

        /* info */
        .card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .card-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: .3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-label {
            font-size: .75rem;
            color: var(--text-dim);
            letter-spacing: .5px;
            background: rgba(255,255,255,.05);
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,.05);
            align-self: flex-start;
        }

        /* score */
        .card-score {
            text-align: left;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .score-num {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            display: block;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card.rank-1 .score-num { background: linear-gradient(135deg, #ffd700, #fffbe6); -webkit-background-clip:text; background-clip:text; }
        .card.rank-2 .score-num { background: linear-gradient(135deg, #e2e8f0, #fff); -webkit-background-clip:text; background-clip:text; }
        .card.rank-3 .score-num { background: linear-gradient(135deg, #f59e0b, #ffd4b0); -webkit-background-clip:text; background-clip:text; }
        .score-unit {
            font-family: 'Outfit', sans-serif;
            font-size: .75rem;
            color: var(--neon-blue);
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-top: 0.2rem;
        }
        .card.rank-1 .score-unit { color: var(--gold); }
        .card.rank-2 .score-unit { color: var(--silver); }
        .card.rank-3 .score-unit { color: var(--bronze); }

        /* ── scanline bar ── */
        .card-footer-bar {
            height: 32px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            border-top: 1px solid rgba(255,255,255,.03);
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,.05);
            border-radius: 99px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            transition: width 1.2s cubic-bezier(.4,0,.2,1);
            position: relative;
            overflow: hidden;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 2s infinite;
        }
        .card.rank-1 .progress-fill { background: linear-gradient(90deg, #d97706, #ffd700); }
        .card.rank-2 .progress-fill { background: linear-gradient(90deg, #94a3b8, #e2e8f0); }
        .card.rank-3 .progress-fill { background: linear-gradient(90deg, #b45309, #f59e0b); }
        
        .progress-pct {
            font-family: 'Outfit', sans-serif;
            font-size: .75rem;
            color: var(--text-dim);
            font-weight: 700;
            min-width: 32px;
            text-align: left;
        }

        /* ── particles ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
            animation: particle-rise var(--dur,8s) var(--del,0s) linear infinite;
            opacity: 0;
        }
        .particle:nth-child(odd) { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        .particle:nth-child(3n) { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }

        /* ── animations ── */
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        @keyframes shimmer {
            100% { left: 200%; }
        }
        @keyframes particle-rise {
            0%   { transform: translate(0, 0) scale(1); opacity: 0; }
            10%  { opacity: .8; }
            90%  { opacity: .5; }
            100% { transform: translate(calc(var(--drift, 20px)), -100vh) scale(.3); opacity: 0; }
        }

        /* ── responsive ── */
        @media (max-width: 480px) {
            .page-header h1 { font-size: 2.2rem; }
            .card-body { padding: 1rem; gap: 0.8rem; }
            .avatar { width: 55px; height: 55px; }
            .card-name { font-size: 1.15rem; }
            .score-num { font-size: 1.8rem; }
            .rank-badge { min-width: 38px; height: 38px; font-size: 1.1rem; }
            .card-footer-bar { padding: 0 1rem; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="particles" id="particles"></div>

<div class="page-header">
    <span class="crown">🏆</span>
    <h1>مسابقة إبداع</h1>
    <p class="subtitle">LEADERBOARD</p>
</div>

<div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
</div>

<div class="cards-list" id="cardsList"></div>

<script>
const kidsData = [
    { name: "يوسف",       emoji: "images/youssef.jpg",      balance: 921 },
    { name: "ياسين",       emoji: "images/yasine.jpg",       balance: 760 },
    { name: "حمزة فتحي",  emoji: "images/hamza_fathy.jpg",  balance: 970 },
    { name: "محمود",      emoji: "images/mahmoud.jpg",      balance: 905 },
    { name: "أحمد",       emoji: "images/ahmed.jpg",        balance: 809 },
    { name: "يحي",        emoji: "images/yahya.jpg",        balance: 899 },
    { name: "عبد الرحمن", emoji: "images/abdulrahman.jpg",  balance: 966 },
    { name: "حمزة أحمد",  emoji: "images/hamza_ahmed.jpg",  balance: 972 },
    { name: "بلال",       emoji: "images/balal.jpg",        balance: 827 },
    { name: "عبيدة",      emoji: "images/obida.jpg",        balance: 863 },
    { name: "أكرم",       emoji: "images/akram.jpg",        balance: 974 }
];

const rankMeta = [
    { cls: 'rank-1', badge: 'gold',   icon: '1st' },
    { cls: 'rank-2', badge: 'silver', icon: '2nd' },
    { cls: 'rank-3', badge: 'bronze', icon: '3rd' },
];

function generateCards() {
    const sorted = [...kidsData].sort((a,b) => b.balance - a.balance);
    const maxScore = sorted[0].balance;
    const list = document.getElementById('cardsList');

    // Default fallback icon if image isn't found
    const fallbackImage = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E`;

    sorted.forEach((kid, i) => {
        const meta = rankMeta[i] || { cls:'', badge:'', icon: '#' + (i+1) };
        const pct = Math.round((kid.balance / maxScore) * 100);

        const card = document.createElement('div');
        card.className = 'card ' + meta.cls;
        card.innerHTML = `
            <div class="card-stripe"></div>
            <div class="card-body">
                <div class="rank-badge ${meta.badge}">${meta.icon}</div>
                <div class="avatar">
                    <img src="${kid.emoji}" alt="${kid.name}" onerror="this.onerror=null; this.src='${fallbackImage}'; this.style.padding='10px';">
                </div>
                <div class="card-info">
                    <div class="card-name">${kid.name}</div>
                    <span class="card-label">الرصيد المتبقي</span>
                </div>
                <div class="card-score">
                    <span class="score-num">${kid.balance}</span>
                    <span class="score-unit">KCG</span>
                </div>
            </div>
            <div class="card-footer-bar">
                <div class="progress-track">
                    <div class="progress-fill" style="width:0%" data-pct="${pct}"></div>
                </div>
                <span class="progress-pct">${pct}%</span>
            </div>
        `;
        list.appendChild(card);
    });

    // animate progress bars after paint
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            document.querySelectorAll('.progress-fill').forEach(el => {
                el.style.width = el.dataset.pct + '%';
            });
        });
    });
}

function generateParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = (Math.random() * 100) + '%';
        p.style.bottom = '-10px';
        p.style.setProperty('--dur', (6 + Math.random()*8) + 's');
        p.style.setProperty('--del', (Math.random()*8) + 's');
        
        // Add random horizontal drift
        const drift = (Math.random() * 60 - 30) + 'px';
        p.style.setProperty('--drift', drift);
        
        container.appendChild(p);
    }
}

generateCards();
generateParticles();
</script>
</body>
</html>
